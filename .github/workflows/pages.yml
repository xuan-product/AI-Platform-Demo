name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Prepare static site
        shell: bash
        run: |
          mkdir -p dist/assets
          printf '%s' '' | base64 -d | gzip -d > dist/index.html
          printf '%s' '' | base64 -d | gzip -d > dist/assets/index-CRAEEX7H.css
          printf '%s' '' | base64 -d | gzip -d > dist/assets/index-DThOwBt3.js
          cp public/favicon.svg dist/favicon.svg
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
